run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - unused
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - revive
    - goconst
    - misspell

linters-settings:
  goconst:
    min-len: 3
    min-occurrences: 3
  revive:
    rules:
      - name: exported
        disabled: true
  misspell:
    locale: US

issues:
  exclude-dirs:
    - vendor
  exclude-generated: strict
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst
