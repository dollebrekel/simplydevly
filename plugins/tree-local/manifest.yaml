apiVersion: siply/v1
kind: Plugin
metadata:
  name: tree-local
  version: 1.0.0
  siply_min: 0.1.0
  description: Browse your local project file tree with git status indicators in a panel
  author: Simply Devly
  license: Apache-2.0
  updated: "2026-04-21"
spec:
  tier: 3
  category: productivity
  capabilities:
    filesystem: read
    network: none
    credentials: none
    bash: none
  extensions:
    panels:
      - name: tree-local
        position: left
        min_width: 20
        max_width: 40
        collapsible: true
        keybind: ctrl+t
        icon: "📁"
        menu_label: File Tree
    menu_items:
      - label: Toggle File Tree
        icon: "📁"
        keybind: ctrl+t
        category: Panels
    keybindings:
      - key: ctrl+t
        description: Toggle file tree panel
