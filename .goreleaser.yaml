version: 2
builds:
  - main: ./cmd/siply
    binary: siply
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
brews:
  - repository:
      owner: siply-dev
      name: homebrew-tap
    homepage: https://siply.dev
    description: AI coding agent with plugin ecosystem
    license: MIT
